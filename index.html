<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0d1d2a">
  <title>Prisma Provider | Loading</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;color:#0d1d2a;background:#f3f6f1;font:600 16px/1.5 system-ui,sans-serif}.loader{display:grid;justify-items:center;gap:16px}.mark{width:52px;height:52px;display:grid;place-items:center;border-radius:50%;background:#c7ef52;font-size:20px;font-weight:800;box-shadow:0 12px 30px rgba(13,29,42,.12)}.bar{width:180px;height:4px;overflow:hidden;border-radius:999px;background:#dce3da}.bar:after{content:"";display:block;width:45%;height:100%;border-radius:inherit;background:#0d1d2a;animation:load 1s ease-in-out infinite alternate}@keyframes load{to{transform:translateX(125%)}}
  </style>
</head>
<body>
  <div class="loader"><div class="mark">P</div><div>Loading Prisma Provider…</div><div class="bar"></div></div>
  <script>
    const pageParts=['site/part-1.txt','site/part-2.txt','site/part-3.txt'];
    Promise.all([
      ...pageParts.map(path=>fetch(path).then(response=>{if(!response.ok)throw new Error(path);return response.text()})),
      fetch('hero-bg.webp').then(response=>{if(!response.ok)throw new Error('hero-bg.webp');return response.text()})
    ])
      .then(resources=>{
        const heroBase64=resources.pop().trim();
        let html=resources.join('');
        const heroImage=`<img class="hero-photo" src="data:image/webp;base64,${heroBase64}" alt="Professional consultation meeting" fetchpriority="high" decoding="sync">`;
        const heroStyles=`.hero-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(112deg,rgba(5,12,18,.76),rgba(8,18,27,.4) 54%,rgba(10,22,31,.2));z-index:1;pointer-events:none}.hero>header,.hero>.hero-grid,.hero>.hero-tabs{position:relative;z-index:3}`;
        html=html.replace('</style>',`${heroStyles}</style>`);
        html=html.replace('<div class="hero">',`<div class="hero">${heroImage}`);
        html=html.replace("    fetch('hero-bg.webp').then(r=>r.text()).then(b=>document.documentElement.style.setProperty('--hero-image',`url(data:image/webp;base64,${b.trim()})`)).catch(()=>{});\n",'');
        document.open();
        document.write(html);
        document.close();
      })
      .catch(error=>{
        console.error(error);
        document.body.innerHTML='<p>Unable to load the website. Please refresh the page.</p>';
      });
  </script>
</body>
</html>
